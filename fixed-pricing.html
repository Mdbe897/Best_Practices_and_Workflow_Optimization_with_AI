<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pricing Card - Basic Plan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .pricing {
      width: 300px;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc;
      padding: 20px;
      text-align: left;
      border-radius: 8px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 8px;
    }

    .price {
      font-size: 18px;
      color: green;
      margin: 0 0 12px;
    }

    .features {
      list-style: none;
      padding-left: 0;
      margin: 0 0 16px;
    }

    .features li {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .features li:last-child {
      border-bottom: none;
    }

    .btn {
      background: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn:hover {
      background: darkblue;
    }
  </style>
</head>
<body>
  <div class="pricing">
    <h2 class="title">Basic Plan</h2>
    <p class="price">$9.99 / month</p>
    <ul class="features">
      <li>1 GB Storage</li>
      <li>Basic Support</li>
      <li>All Core Features</li>
    </ul>
    <button class="btn">Start Trial</button>
  </div>
</body>
</html>
