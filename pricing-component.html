<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pricing Cards</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
    }

    .pricing-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pricing-card {
      width: 280px;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc;
      padding: 20px;
      text-align: left;
      border-radius: 8px;
    }

    .pricing-card__title {
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 8px;
    }

    .pricing-card__price {
      font-size: 18px;
      color: green;
      margin: 0 0 12px;
    }

    .pricing-card__features {
      list-style: none;
      padding-left: 0;
      margin: 0 0 16px;
    }

    .pricing-card__features li {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .pricing-card__features li:last-child {
      border-bottom: none;
    }

    .pricing-card__button {
      background: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      margin-top: 10px;
      cursor: pointer;
    }

    .pricing-card__button:hover {
      background: darkblue;
    }
  </style>
</head>
<body>
  <div class="pricing-grid" id="pricing-grid"></div>

  <script>
    function createCard(title, price, features, buttonLabel = "Start Trial") {
      const card = document.createElement("div");
      card.className = "pricing-card";

      const h2 = document.createElement("h2");
      h2.className = "pricing-card__title";
      h2.textContent = title;

      const p = document.createElement("p");
      p.className = "pricing-card__price";
      p.textContent = price;

      const ul = document.createElement("ul");
      ul.className = "pricing-card__features";

      features.forEach(feature => {
        const li = document.createElement("li");
        li.textContent = feature;
        ul.appendChild(li);
      });

      const btn = document.createElement("button");
      btn.className = "pricing-card__button";
      btn.textContent = buttonLabel;

      card.appendChild(h2);
      card.appendChild(p);
      card.appendChild(ul);
      card.appendChild(btn);

      return card;
    }

    // Example usage
    const plans = [
      {
        title: "Basic Plan",
        price: "$9.99 / month",
        features: ["1 GB Storage", "Basic Support", "All Core Features"]
      },
      {
        title: "Pro Plan",
        price: "$19.99 / month",
        features: ["10 GB Storage", "Priority Support", "Advanced Analytics"]
      },
      {
        title: "Enterprise",
        price: "Contact us",
        features: ["Unlimited Storage", "Dedicated Support", "Custom Integrations"]
      }
    ];

    const grid = document.getElementById("pricing-grid");
    plans.forEach(plan => {
      const card = createCard(plan.title, plan.price, plan.features);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
